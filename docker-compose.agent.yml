version: "3.9"

# Docker Compose for running claude-agent on a server.
# The agent connects OUT to the relay — no inbound ports needed.
#
# Usage:
#   AGENT_SECRET=mysecret RELAY_URL=wss://my-relay.com docker compose -f docker-compose.agent.yml up -d

services:
  agent:
    image: ghcr.io/vrtoursuz/claude-orchestrator/agent:latest
    # Or build locally:
    # build:
    #   context: ./agent
    restart: unless-stopped
    environment:
      - RELAY_URL=${RELAY_URL:-wss://your-relay.up.railway.app}
      - AGENT_SECRET=${AGENT_SECRET}
      - AGENT_NAME=${AGENT_NAME:-my-server}
      - AGENT_ID=${AGENT_ID:-}          # leave empty to auto-generate
      - DEFAULT_CMD=${DEFAULT_CMD:-bash}
    volumes:
      # Optional: mount a persistent config to keep the same agent_id across restarts
      - agent-config:/agent
    # Optional: mount the Docker socket to run docker commands from the terminal
    # - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  agent-config:
